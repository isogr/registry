  remarks: Replaces Japanese Geodetic Datum 2011 (vertical) from 2025-04-01.
  scope: Spatial referencing
  originDescription: >-
    JGD2024 (vertical) is a gravimetric geoid-based vertical datum using the
    "Geoid 2024 Japan and Surrounding Area" geoid model based on the geoid model
    JGEOID2024 referenced to IAG-recommended W0 value of 62,636,853.4 m2/s2.
    "Geoid 2024 Japan and Surrounding Area" has an offset of +0.1366m from
    JGEOID2024 to match mean sea level of Tokyo Bay at the Aburatsubo tide
    gauge. The datum uses as height reference epoch of 2024-06-01.
