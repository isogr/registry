  remarks: >-
    Grid transformation from NAD83(CSRS) v7 ellipsoidal heights at epoch 2010.0
    to CGVD28 normal orthometric heights using bi-quadratic interpolation of
    hybrid geoid model HTv2.0. Derived from the NAD83(CSRS) v3 to CGVD28
    transformation by applying the NAD83(CSRS) v8.0 velocity model to
    incorporate the propagation of heights from epoch 1997.0 to 2010.0.
    Bi-linear interpolation of the grid file will give results agreeing to
    within 1cm 99.97% of the time. Replaces previous v1 of this transformation
    based on the NAD83(CSRS) v7.0 velocity model (ISOGR:970) as of 2025-12-02.
