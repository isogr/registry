  remarks: >-
    Adopts Clarke's values for a and 1/f. Adopts his 1865 ratio of 39.370432
    inches per metre to convert semi-major axis to metres. Also known as Clarke
    Modified 1880. The Clarke 1880 (RGS) figure is one of several modifications
    to the original definition. The name Clarke Modified is usually taken to be
    the RGS modification.
