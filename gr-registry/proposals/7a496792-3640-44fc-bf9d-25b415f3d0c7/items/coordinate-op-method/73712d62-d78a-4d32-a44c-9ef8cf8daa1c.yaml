id: 73712d62-d78a-4d32-a44c-9ef8cf8daa1c
data:
  identifier: -11
  name: Time-Specific Position Vector Transformation (geocentric Cartesian domain)
  aliases:
    - EPSG:1065
  informationSources: []
  remarks: >-
    The time-specific ooordinate transformation is an alternative method to the
    time-dependent coordinate transformation. In this method, the 7-parameter
    transformation and its parameters are valid for only a specified reference
    epoch (provided as an additional parameter) and the source coordinates are
    assumed to be at this epoch prior to transformation. Note the analogy with
    the rotation for the Time-Specific Coordinate Frame Transformation but
    beware of the differences!  The Position Vector Transformation convention is
    used by IAG.
