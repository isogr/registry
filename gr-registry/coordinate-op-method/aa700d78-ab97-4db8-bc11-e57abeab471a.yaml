  name: Position Vector Transformation (geographic 2D domain)
  aliases: []
  informationSources: []
  remarks: >-
    This method uses clockwise rotations and is similar to the Coordinate Frame
    Transformation methods that uses counter-clockwise rotations. The Position
    Vector (clockwise) convention is used by the International Earth Rotation
    and Reference Systems Service (IERS) and International GNSS Service (IGS).
