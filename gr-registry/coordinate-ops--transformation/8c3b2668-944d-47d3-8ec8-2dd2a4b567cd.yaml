  remarks: >-
    Grid transformation from CGVD28(HTv2.0) orthometric heights to
    CGVD2013(CGG2013a) orthometric heights at epoch 2002.0 using bi-quadratic
    interpolation. Derived from the CGVD28(HTv2.0) to CGVD2013(CCG2013a) epoch
    1997.0 transformation by applying the NAD83(CSRS) v8.0 velocity model to
    incorporate the propagation of CGVD2013 heights from epoch 1997.0 to 2002.0.
    Bi-linear interpolation of the grid file will give results agreeing to
    within 1cm 99.97% of the time. Replaces previous v1 of this transformation
    based on the NAD83(CSRS) v7.0 velocity model (ISOGR:1274) as of 2025-12-02.
